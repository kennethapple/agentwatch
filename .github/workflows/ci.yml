name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Ingest ───────────────────────────────────────────────────────────────────
  test-ingest:
    name: Test ingest service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/ingest/package-lock.json
      - run: npm ci
      - run: npm test

  # ── Agent ─────────────────────────────────────────────────────────────────────
  test-agent:
    name: Test agent service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/agent/package-lock.json
      - run: npm ci
      - run: npm test

  # ── Frontend ──────────────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  # ── Terraform ─────────────────────────────────────────────────────────────────
  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.9'
      - run: terraform init -backend=false
      - run: terraform validate
      - run: terraform fmt -check -recursive
