name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# CI is the gate — every push and PR runs this.
# Terraform and Deploy both declare `needs: ci` so they never
# run against code that fails tests or lint.

jobs:
  test-ingest:
    name: Test ingest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/ingest/package-lock.json
      - run: npm ci
      - run: npm test

  test-agent:
    name: Test agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/agent/package-lock.json
      - run: npm ci
      - run: npm test

  lint-frontend:
    name: Lint frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: services/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
