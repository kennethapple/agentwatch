name: Deploy

on:
  push:
    branches: [main]

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}

jobs:
  # ── Detect what changed ─────────────────────────────────────────────────────
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      ingest:   ${{ steps.filter.outputs.ingest }}
      agent:    ${{ steps.filter.outputs.agent }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ingest:
              - 'services/ingest/**'
              - 'infra/terraform/functions.tf'
            agent:
              - 'services/agent/**'
            frontend:
              - 'services/frontend/**'

  # ── Deploy ingest Cloud Functions ───────────────────────────────────────────
  deploy-ingest:
    name: Deploy ingest functions
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ingest == 'true'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Gmail ingest function
        run: |
          gcloud functions deploy agentwatch-ingest-gmail \
            --gen2 \
            --runtime nodejs20 \
            --region $GCP_REGION \
            --entry-point gmailHandler \
            --source services/ingest \
            --trigger-http \
            --service-account agentwatch-ingest-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},PUBSUB_TOPIC=agentwatch-events \
            --set-secrets GMAIL_WEBHOOK_TOKEN=agentwatch-gmail-webhook-token:latest \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy Slack ingest function
        run: |
          gcloud functions deploy agentwatch-ingest-slack \
            --gen2 \
            --runtime nodejs20 \
            --region $GCP_REGION \
            --entry-point slackHandler \
            --source services/ingest \
            --trigger-http \
            --service-account agentwatch-ingest-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},PUBSUB_TOPIC=agentwatch-events \
            --set-secrets SLACK_SIGNING_SECRET=agentwatch-slack-signing-secret:latest \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Print function URLs
        run: |
          echo "Gmail URL: $(gcloud functions describe agentwatch-ingest-gmail --region $GCP_REGION --project ${{ secrets.GCP_PROJECT_ID }} --format='value(serviceConfig.uri)')"
          echo "Slack URL: $(gcloud functions describe agentwatch-ingest-slack --region $GCP_REGION --project ${{ secrets.GCP_PROJECT_ID }} --format='value(serviceConfig.uri)')"

  # ── Build + deploy agent ────────────────────────────────────────────────────
  deploy-agent:
    name: Build and deploy agent
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Configure Docker
        run: gcloud auth configure-docker $GCP_REGION-docker.pkg.dev --quiet

      - name: Build and push agent image
        id: build
        run: |
          REGISTRY="$GCP_REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/agentwatch"
          IMAGE="$REGISTRY/agent:${{ github.sha }}"
          docker build -t $IMAGE services/agent
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "Built: $IMAGE"

      - name: Deploy agent to Cloud Run
        run: |
          gcloud run deploy agentwatch-agent \
            --image ${{ steps.build.outputs.image }} \
            --region $GCP_REGION \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --service-account agentwatch-agent-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},PUBSUB_TOPIC=agentwatch-events,NODE_ENV=production \
            --set-secrets ANTHROPIC_API_KEY=agentwatch-anthropic-api-key:latest \
            --min-instances 0 \
            --max-instances 10 \
            --memory 1Gi \
            --cpu 2 \
            --timeout 300 \
            --allow-unauthenticated

      - name: Print agent URL
        run: |
          echo "Agent URL: $(gcloud run services describe agentwatch-agent --region $GCP_REGION --project ${{ secrets.GCP_PROJECT_ID }} --format='value(status.url)')"

  # ── Build + deploy frontend ─────────────────────────────────────────────────
  deploy-frontend:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    needs: [changes, deploy-agent]
    if: |
      always() &&
      (needs.changes.outputs.frontend == 'true' || needs.deploy-agent.result == 'success')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Get agent URL
        id: agent
        run: |
          URL=$(gcloud run services describe agentwatch-agent \
            --region $GCP_REGION \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format='value(status.url)' 2>/dev/null || echo "")
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Agent URL: $URL"

      - name: Configure Docker
        run: gcloud auth configure-docker $GCP_REGION-docker.pkg.dev --quiet

      - name: Build and push frontend image
        id: build
        run: |
          REGISTRY="$GCP_REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/agentwatch"
          IMAGE="$REGISTRY/frontend:${{ github.sha }}"
          docker build \
            --build-arg NEXT_PUBLIC_AGENT_URL=${{ steps.agent.outputs.url }} \
            -t $IMAGE services/frontend
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy agentwatch-frontend \
            --image ${{ steps.build.outputs.image }} \
            --region $GCP_REGION \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --service-account agentwatch-frontend-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},NEXT_PUBLIC_AGENT_URL=${{ steps.agent.outputs.url }},NODE_ENV=production" \
            --min-instances 0 \
            --max-instances 5 \
            --memory 512Mi \
            --cpu 1 \
            --allow-unauthenticated

      - name: Print frontend URL
        run: |
          echo "🚀 Frontend live at: $(gcloud run services describe agentwatch-frontend --region $GCP_REGION --project ${{ secrets.GCP_PROJECT_ID }} --format='value(status.url)')"
