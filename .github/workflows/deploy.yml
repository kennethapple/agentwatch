name: Deploy

on:
  push:
    branches: [main]

# Cancel any in-progress deploy when a new push arrives —
# safe because docker builds and gcloud deploys are idempotent.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}

jobs:
  # ── Detect which services changed ───────────────────────────────────────────
  # Run first so downstream jobs only execute for what actually changed.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      ingest:   ${{ steps.filter.outputs.ingest }}
      agent:    ${{ steps.filter.outputs.agent }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ingest:
              - 'services/ingest/**'
            agent:
              - 'services/agent/**'
            frontend:
              - 'services/frontend/**'

  # ── Ingest — Cloud Functions (code-only deploys) ────────────────────────────
  # Infra config changes (runtime, memory, SA) go through terraform.yml.
  # This job handles source code changes only.
  # Slack deploys first — GCP rejects concurrent function updates in the
  # same project with "unable to queue the operation".
  deploy-ingest:
    name: Deploy ingest
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ingest == 'true'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Deploy Slack function
        run: |
          gcloud functions deploy agentwatch-ingest-slack \
            --gen2 \
            --runtime nodejs22 \
            --region $GCP_REGION \
            --entry-point slackHandler \
            --source services/ingest \
            --trigger-http \
            --service-account agentwatch-ingest-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},PUBSUB_TOPIC=agentwatch-events \
            --set-secrets SLACK_SIGNING_SECRET=slack-signing-secret:latest \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy Gmail function
        run: |
          gcloud functions deploy agentwatch-ingest-gmail \
            --gen2 \
            --runtime nodejs22 \
            --region $GCP_REGION \
            --entry-point gmailHandler \
            --source services/ingest \
            --trigger-http \
            --service-account agentwatch-ingest-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},PUBSUB_TOPIC=agentwatch-events \
            --set-secrets GMAIL_WEBHOOK_TOKEN=gmail-webhook-token:latest \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Print URLs
        run: |
          echo "Slack: $(gcloud functions describe agentwatch-ingest-slack --region $GCP_REGION --project ${{ secrets.GCP_PROJECT_ID }} --format='value(serviceConfig.uri)')"
          echo "Gmail: $(gcloud functions describe agentwatch-ingest-gmail --region $GCP_REGION --project ${{ secrets.GCP_PROJECT_ID }} --format='value(serviceConfig.uri)')"

  # ── Agent — Cloud Run ───────────────────────────────────────────────────────
  # Builds a Docker image, pushes to Artifact Registry, deploys to Cloud Run.
  deploy-agent:
    name: Deploy agent
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Configure Docker
        run: gcloud auth configure-docker $GCP_REGION-docker.pkg.dev --quiet

      - name: Build and push image
        id: build
        run: |
          IMAGE="$GCP_REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/agentwatch/agent:${{ github.sha }}"
          docker build -t $IMAGE services/agent
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy agentwatch-agent \
            --image ${{ steps.build.outputs.image }} \
            --region $GCP_REGION \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --service-account agentwatch-agent-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},PUBSUB_TOPIC=agentwatch-events,NODE_ENV=production \
            --set-secrets ANTHROPIC_API_KEY=anthropic-api-key:latest \
            --min-instances 0 --max-instances 10 \
            --memory 1Gi --cpu 2 --timeout 300 \
            --allow-unauthenticated

      - name: Print URL
        run: |
          echo "Agent: $(gcloud run services describe agentwatch-agent --region $GCP_REGION --project ${{ secrets.GCP_PROJECT_ID }} --format='value(status.url)')"

  # ── Frontend — Cloud Run ────────────────────────────────────────────────────
  # Depends on deploy-agent because NEXT_PUBLIC_AGENT_URL is baked into
  # the image at build time — must be fetched from the live agent service.
  # Runs whenever frontend changes OR whenever agent was just redeployed
  # (in case the agent URL changed).
  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: [changes, deploy-agent]
    if: |
      always() &&
      (needs.changes.outputs.frontend == 'true' || needs.deploy-agent.result == 'success')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Get agent URL
        id: agent
        run: |
          URL=$(gcloud run services describe agentwatch-agent \
            --region $GCP_REGION \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format='value(status.url)' 2>/dev/null || echo "")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Configure Docker
        run: gcloud auth configure-docker $GCP_REGION-docker.pkg.dev --quiet

      - name: Build and push image
        id: build
        run: |
          IMAGE="$GCP_REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/agentwatch/frontend:${{ github.sha }}"
          docker build \
            --build-arg NEXT_PUBLIC_AGENT_URL=${{ steps.agent.outputs.url }} \
            -t $IMAGE services/frontend
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy agentwatch-frontend \
            --image ${{ steps.build.outputs.image }} \
            --region $GCP_REGION \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --service-account agentwatch-frontend-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},NEXT_PUBLIC_AGENT_URL=${{ steps.agent.outputs.url }},NODE_ENV=production" \
            --min-instances 0 --max-instances 5 \
            --memory 512Mi --cpu 1 \
            --allow-unauthenticated

      - name: Print URL
        run: |
          echo "🚀 Frontend: $(gcloud run services describe agentwatch-frontend --region $GCP_REGION --project ${{ secrets.GCP_PROJECT_ID }} --format='value(status.url)')"
