name: Deploy

on:
  push:
    branches: [main]

env:
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev

jobs:
  deploy-ingest:
    name: Deploy ingest functions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Gmail function
        run: |
          gcloud functions deploy agentwatch-ingest-gmail \
            --gen2 \
            --runtime nodejs20 \
            --region $GCP_REGION \
            --entry-point gmailHandler \
            --source services/ingest \
            --trigger-http \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy Slack function
        run: |
          gcloud functions deploy agentwatch-ingest-slack \
            --gen2 \
            --runtime nodejs20 \
            --region $GCP_REGION \
            --entry-point slackHandler \
            --source services/ingest \
            --trigger-http \
            --project ${{ secrets.GCP_PROJECT_ID }}

  deploy-agent:
    name: Build and deploy agent service
    runs-on: ubuntu-latest
    needs: deploy-ingest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $ARTIFACT_REGISTRY

      - name: Build and push agent image
        run: |
          IMAGE=$ARTIFACT_REGISTRY/${{ secrets.GCP_PROJECT_ID }}/agentwatch/agent:${{ github.sha }}
          docker build -t $IMAGE services/agent
          docker push $IMAGE
          echo "AGENT_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy agentwatch-agent \
            --image $AGENT_IMAGE \
            --region $GCP_REGION \
            --project ${{ secrets.GCP_PROJECT_ID }}

  deploy-frontend:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    needs: deploy-agent
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $ARTIFACT_REGISTRY

      - name: Build and push frontend image
        run: |
          IMAGE=$ARTIFACT_REGISTRY/${{ secrets.GCP_PROJECT_ID }}/agentwatch/frontend:${{ github.sha }}
          docker build -t $IMAGE services/frontend
          docker push $IMAGE
          echo "FRONTEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy agentwatch-frontend \
            --image $FRONTEND_IMAGE \
            --region $GCP_REGION \
            --project ${{ secrets.GCP_PROJECT_ID }}
