name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - 'services/ingest/**'
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - 'services/ingest/**'

env:
  TF_VERSION: '1.9'
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}

jobs:
  terraform:
    name: ${{ github.event_name == 'pull_request' && 'Plan' || 'Apply' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      # Remove stale state lock left by a previously failed run.
      # Deleting the lock file from GCS is safe — we know it's stale because
      # no other run is currently executing (GitHub Actions serializes on main).
      - name: Clear stale state lock
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          gsutil rm gs://boreal-phoenix-405421-agentwatch-tfstate/agentwatch/default.tflock 2>/dev/null \
            && echo "Stale lock removed" \
            || echo "No lock present"

      # Import bootstrap-created resources if not already in state.
      # `terraform import` is idempotent when the resource is already managed —
      # it exits 0 if in state, so we suppress errors with || true.
      - name: Import bootstrap resources into state
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          terraform import -lock=false \
            google_iam_workload_identity_pool.github \
            "projects/boreal-phoenix-405421/locations/global/workloadIdentityPools/agentwatch-gh-pool" \
            || true

          terraform import -lock=false \
            google_iam_workload_identity_pool_provider.github \
            "projects/boreal-phoenix-405421/locations/global/workloadIdentityPools/agentwatch-gh-pool/providers/agentwatch-gh-provider" \
            || true

          terraform import -lock=false \
            google_service_account.deploy_sa \
            "projects/boreal-phoenix-405421/serviceAccounts/agentwatch-deploy-sa@boreal-phoenix-405421.iam.gserviceaccount.com" \
            || true

          terraform import -lock=false \
            google_firestore_database.default \
            "(default)" \
            || true

      - name: Terraform plan
        if: github.event_name == 'pull_request'
        id: plan
        run: |
          terraform plan -no-color \
            -var="anthropic_api_key=${{ secrets.ANTHROPIC_API_KEY }}" \
            -var="slack_signing_secret=${{ secrets.SLACK_SIGNING_SECRET }}" \
            -var="gmail_webhook_token=${{ secrets.GMAIL_WEBHOOK_TOKEN }}" \
            2>&1 | tee /tmp/plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan.txt', 'utf8');
            const truncated = plan.length > 65000
              ? plan.slice(0, 65000) + '\n\n... (truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Fail if plan errored
        if: github.event_name == 'pull_request' && steps.plan.outputs.exitcode != '0'
        run: exit 1

      - name: Terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          terraform apply -auto-approve \
            -var="anthropic_api_key=${{ secrets.ANTHROPIC_API_KEY }}" \
            -var="slack_signing_secret=${{ secrets.SLACK_SIGNING_SECRET }}" \
            -var="gmail_webhook_token=${{ secrets.GMAIL_WEBHOOK_TOKEN }}"
