name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - 'services/ingest/**'
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - 'services/ingest/**'

env:
  TF_VERSION: '1.9'
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}

# Serialize terraform runs — never apply concurrently with another
# terraform run or a deploy (both touch GCP function resources).
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    name: ${{ github.event_name == 'pull_request' && 'Plan' || 'Apply' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      # Clear any stale state lock before applying.
      # Locks are left behind when a run is cancelled or times out mid-apply.
      # Safe to remove here because GitHub Actions serializes pushes to main,
      # so no concurrent apply can legitimately hold the lock at this point.
      - name: Clear stale state lock
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          LOCKS=$(gsutil ls "gs://boreal-phoenix-405421-agentwatch-tfstate/agentwatch/*.tflock" 2>/dev/null || true)
          if [ -n "$LOCKS" ]; then
            echo "⚠ Stale lock found — removing: $LOCKS"
            echo "$LOCKS" | xargs gsutil rm
          else
            echo "No stale lock present"
          fi

      - name: Terraform plan
        if: github.event_name == 'pull_request'
        id: plan
        run: |
          terraform plan -no-color \
            -var="anthropic_api_key=${{ secrets.ANTHROPIC_API_KEY }}" \
            -var="slack_signing_secret=${{ secrets.SLACK_SIGNING_SECRET }}" \
            -var="gmail_webhook_token=${{ secrets.GMAIL_WEBHOOK_TOKEN }}" \
            2>&1 | tee /tmp/plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan.txt', 'utf8');
            const truncated = plan.length > 65000
              ? plan.slice(0, 65000) + '\n\n... (truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Fail if plan errored
        if: github.event_name == 'pull_request' && steps.plan.outputs.exitcode != '0'
        run: exit 1

      - name: Terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          terraform apply -auto-approve \
            -var="anthropic_api_key=${{ secrets.ANTHROPIC_API_KEY }}" \
            -var="slack_signing_secret=${{ secrets.SLACK_SIGNING_SECRET }}" \
            -var="gmail_webhook_token=${{ secrets.GMAIL_WEBHOOK_TOKEN }}"
